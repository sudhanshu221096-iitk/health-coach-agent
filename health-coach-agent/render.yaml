services:
  - type: web
    name: health-coach-agent
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PYTHONPATH=/opt/render/project/src uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./data/chroma_db
      - key: WELLNESS_PDF_PATH
        value: ./data/wellness_protocol.pdf
      - key: PYTHONPATH
        value: /opt/render/project/src
