services:
  - type: web
    name: health-coach-agent
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: cd /opt/render/project/src && uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: ./data/chroma_db
      - key: WELLNESS_PDF_PATH
        value: ./data/wellness_protocol.pdf
